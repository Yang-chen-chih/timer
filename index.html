<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>計時器</title>
<link rel="icon" href="下載4.jpg" type="image/jpg">
<style>
body { font-family:'Nunito',sans-serif; background:#f7f7f7; margin:20px; }
.timer-card { display:flex; align-items:center; padding:10px; background:#fff; margin-bottom:10px; border-radius:8px; cursor:pointer; }
.task-name { flex:1; margin-right:10px; }
.time-input { width:50px; text-align:center; margin:0 2px; }
.status-badge { padding:2px 6px; border-radius:4px; background:#eee; }
.progress-ring { width:40px; height:40px; margin-right:10px; }
</style>
</head>
<body>

<div id="timer-container"></div>
<audio id="beep" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
<script type="module">
// 假設已初始化 supabase 並有 db, TABLE
let timers = [], lastSec = {}, activeEditingId = null;

// 工具
const pad2 = n => n.toString().padStart(2,'0');
const now = () => performance.now();
const CIRC = 2*Math.PI*18; // 圓環周長

// ─── 計時器卡片 ─────────────────────────
function createTimerCard(t){
  const card = document.createElement('div');
  card.className='timer-card';
  card.dataset.id=t.id;
  card.innerHTML = `
    <svg class="progress-ring" viewBox="0 0 40 40">
      <circle r="18" cx="20" cy="20" stroke="#eee" stroke-width="4" fill="none"/>
      <circle class="progress-ring-fg" r="18" cx="20" cy="20" stroke="#0b5ed7" stroke-width="4" fill="none"
        stroke-dasharray="${CIRC}" stroke-dashoffset="${CIRC}"/>
    </svg>
    <input class="task-name" value="${(t.name||'').replace(/"/g,'&quot;')}" 
      onfocus="activeEditingId='${t.id}'" onblur="handleNameBlur(this,'${t.id}')">
    <div class="time-display">
      <input type="number" class="time-input" data-type="min" value="${pad2(Math.floor(t.remaining_seconds/60))}" 
        onfocus="activeEditingId='${t.id}'" onblur="handleTimeBlur(this,'${t.id}')">
      <span>:</span>
      <input type="number" class="time-input" data-type="sec" value="${pad2(t.remaining_seconds%60)}" 
        onfocus="activeEditingId='${t.id}'" onblur="handleTimeBlur(this,'${t.id}')">
    </div>
    <div class="status-badge">${t.is_active?'進行中':'暫停'}</div>
  `;
  card.onclick = e=>{ if(e.target.tagName!=='INPUT') toggleTimer(t.id); };
  card.querySelectorAll('input').forEach(inp=>inp.onkeydown=e=>e.key==='Enter'&&inp.blur());
  return card;
}

// 渲染
function renderAll(){
  const container = document.getElementById('timer-container');
  container.innerHTML='';
  timers.forEach(t=>container.appendChild(createTimerCard(t)));
}

// 更新卡片
function updateCardDisplay(t, ms){
  if(activeEditingId===t.id) return;
  const card=document.querySelector(`.timer-card[data-id="${t.id}"]`);
  if(!card) return;
  card.querySelector('[data-type="min"]').value=pad2(Math.floor(t.remaining_seconds/60));
  card.querySelector('[data-type="sec"]').value=pad2(t.remaining_seconds%60);
  card.querySelector('.status-badge').textContent=t.is_active?'進行中':'暫停';
  const ring=card.querySelector('.progress-ring-fg');
  const p=t.initial_seconds>0?Math.max(0,ms/(t.initial_seconds*1000)):0;
  ring.setAttribute('stroke-dashoffset',(CIRC*(1-p)).toFixed(2));
}

// ─── RAF 循環 ─────────────────────────
function rafLoop(){
  const t0=now();
  timers.forEach(t=>{
    if(!t.is_active||t.endPerf===null) return;
    const ms=t.endPerf-t0;
    const s=Math.ceil(ms/1000);
    if(s<=0){
      t.is_active=false; t.remaining_seconds=0; t.endPerf=null; lastSec[t.id]=undefined;
      document.getElementById('beep').play();
      db.from(TABLE).update({remaining_seconds:0,is_active:false,started_at:null}).eq('id',t.id).catch(console.error);
      renderAll();
      return;
    }
    if(lastSec[t.id]!==s){ t.remaining_seconds=s; lastSec[t.id]=s; updateCardDisplay(t,ms); }
  });
  requestAnimationFrame(rafLoop);
}

// ─── 事件處理 ─────────────────────────
async function handleNameBlur(el,id){
  const t=timers.find(x=>x.id===id); if(t) t.name=el.value; activeEditingId=null;
  try{ await db.from(TABLE).update({name:el.value}).eq('id',id); } catch(e){ console.error(e); }
}

async function handleTimeBlur(el,id){
  const t=timers.find(x=>x.id===id); if(!t) return;
  const card=document.querySelector(`.timer-card[data-id="${id}"]`);
  const m=parseInt(card.querySelector('[data-type="min"]').value)||0;
  const s=parseInt(card.querySelector('[data-type="sec"]').value)||0;
  const total=Math.min(99,m)*60+Math.min(59,s);
  Object.assign(t,{remaining_seconds:total,initial_seconds:total,is_active:false,endPerf:null});
  activeEditingId=null;
  try{ await db.from(TABLE).update({remaining_seconds:total,initial_seconds:total,is_active:false,started_at:null}).eq('id',id); } catch(e){ console.error(e); }
  renderAll();
}

async function toggleTimer(id){
  const t=timers.find(x=>x.id===id); if(!t||t.remaining_seconds<=0) return;
  t.is_active=!t.is_active;
  t.endPerf=t.is_active?now()+t.remaining_seconds*1000:null;
  try{ await db.from(TABLE).update({is_active:t.is_active,remaining_seconds:t.remaining_seconds,started_at:t.is_active?new Date().toISOString():null}).eq('id',id); } catch(e){ console.error(e); }
  renderAll();
}

// ─── Realtime 即時同步 ─────────────────
function setupRealtimeSubscription(){
  db.channel('timers-sync-'+Math.random().toString(36).slice(2))
    .on('postgres_changes',{event:'*',schema:'public',table:TABLE},p=>{
      if(activeEditingId) return;
      if(p.eventType==='INSERT') timers.push({...p.new,endPerf:p.new.is_active?now()+p.new.remaining_seconds*1000:null});
      else if(p.eventType==='DELETE') timers=timers.filter(x=>x.id!==p.old.id);
      else if(p.eventType==='UPDATE'){
        const t=timers.find(x=>x.id===p.new.id);
        if(t) Object.assign(t,{name:p.new.name,remaining_seconds:p.new.remaining_seconds,initial_seconds:p.new.initial_seconds,is_active:p.new.is_active,started_at:p.new.started_at,endPerf:p.new.is_active?now()+p.new.remaining_seconds*1000:null});
      }
      renderAll();
    }).subscribe();
}

// ─── 初始化 ─────────────────────────
async function fetchTimers(){
  const {data,error}=await db.from(TABLE).select('*');
  if(error){ console.error(error); return; }
  timers=data.map(t=>({...t,endPerf:t.is_active?now()+t.remaining_seconds*1000:null}));
  renderAll();
  setupRealtimeSubscription();
}
fetchTimers();
requestAnimationFrame(rafLoop);
</script>
</body>
</html>
