<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>計時器</title>
<link rel="icon" href="下載4.jpg" type="image/jpg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=Varela+Round&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:#f2f7ea;color:#1c2712;min-height:100vh;padding:2rem;}
  .timer-card{background:#fdfef9;border-radius:1rem;padding:1rem;margin-bottom:1rem;display:inline-block;width:150px;text-align:center;cursor:pointer;}
  .time-input{font-size:2rem;width:2.5em;text-align:center;}
  .task-name{width:100%;text-align:center;margin-bottom:.5rem;}
</style>
</head>
<body>

<h1>計時器</h1>
<div id="timer-grid"></div>
<button id="add-btn">＋ 新增任務</button>

<script>
// 範例資料，離線測試用
let timers = [];
let activeId = null;

const pad = n => String(n).padStart(2,'0');

function render(){
  const grid = document.getElementById('timer-grid');
  grid.innerHTML='';
  timers.forEach(t=>{
    const now = Date.now();
    const ms = t.is_active ? Math.max(0, t.end-now) : t.remaining*1000;
    const sec = Math.ceil(ms/1000);
    const card = document.createElement('div');
    card.className='timer-card';
    card.innerHTML=`
      <input class="task-name" value="${t.name}" oninput="t.name=this.value">
      <div>
        <input class="time-input" value="${pad(Math.floor(sec/60))}" 
          onkeydown="if(event.key==='Enter'){updateTime('${t.id}', this.value, true);}">
        :
        <input class="time-input" value="${pad(sec%60)}"
          onkeydown="if(event.key==='Enter'){updateTime('${t.id}', this.value, false);}">
      </div>
    `;
    card.onclick=e=>{
      if(e.target.tagName!=='INPUT') toggle(t.id);
    };
    grid.appendChild(card);
  });
}

// 更新時間函數
function updateTime(id, val, isMin){
  const t = timers.find(x=>x.id===id);
  const m = isMin ? parseInt(val)||0 : Math.floor(t.remaining/60);
  const s = isMin ? t.remaining%60 : parseInt(val)||0;
  t.remaining = m*60+s;
  t.initial = t.remaining;
  activeId=id;
  toggle(id);
}

// 切換啟動/暫停
function toggle(id){
  const t = timers.find(x=>x.id===id);
  if(t.remaining<=0 && !t.is_active) return;
  if(!t.is_active){
    t.is_active=true;
    t.end=Date.now()+t.remaining*1000;
  } else {
    t.is_active=false;
    t.remaining=Math.ceil((t.end-Date.now())/1000);
    t.end=null;
  }
  activeId=null;
  render();
}

// 新增任務
document.getElementById('add-btn').onclick=()=>{
  const id='t'+Date.now();
  timers.push({id,name:'新任務',remaining:0,initial:0,is_active:false,end:null});
  render();
}

// 計時迴圈
setInterval(()=>{
  const now=Date.now();
  timers.forEach(t=>{
    if(t.is_active && t.end<=now){
      t.is_active=false;
      t.remaining=0;
      t.end=null;
      alert('時間到！');
    }
  });
  render();
},1000);

render();
</script>
</body>
</html>
