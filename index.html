<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計時器</title>
    <link rel="icon" href="下載4.jpg" type="image/jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Varela+Round&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --sage: #7a9e5a; --sage-light: #b5d18c; --sage-pale: #e8f3db;
            --ink: #1c2712; --ink-mid: #3d4f2a; --ink-soft: #6b7f57;
            --parchment: #f5f9ee; --cream: #fdfef9; --amber: #d4830a; --white: #ffffff;
            --card-border: rgba(122, 158, 90, 0.18);
            --shadow-card: 0 2px 20px rgba(28, 39, 18, 0.06), 0 1px 4px rgba(28, 39, 18, 0.04);
            --shadow-hover: 0 8px 40px rgba(28, 39, 18, 0.10), 0 2px 8px rgba(28, 39, 18, 0.06);
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--parchment); color: var(--ink);
            min-height: 100vh; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: radial-gradient(ellipse 80% 60% at 15% 20%, rgba(181, 209, 140, 0.18) 0%, transparent 60%),
                              radial-gradient(ellipse 60% 80% at 85% 75%, rgba(122, 158, 90, 0.10) 0%, transparent 55%);
            pointer-events: none; z-index: 0;
        }
        header { position: relative; z-index: 10; padding: 2.5rem 3rem 0; display: flex; align-items: flex-end; justify-content: space-between; }
        .brand-title { font-family: 'Nunito', sans-serif; font-size: 2.6rem; font-weight: 900; color: var(--ink); }
        .brand-title span { color: var(--sage); }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; display: inline-block; margin-right: 5px; }
        .sync-dot.synced { background: #5cb85c; box-shadow: 0 0 8px #5cb85c; }
        .sync-label { font-size: 0.7rem; color: var(--ink-soft); text-transform: uppercase; }
        .grid-wrap { position: relative; z-index: 10; padding: 2rem 3rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
        .timer-card {
            background: var(--cream); border: 1px solid var(--card-border); border-radius: 1.25rem;
            padding: 2rem 1.5rem; box-shadow: var(--shadow-card); transition: all 0.3s ease;
            display: flex; flex-direction: column; gap: 1rem; cursor: pointer; position: relative;
        }
        .timer-card.running { border-color: var(--sage); background: var(--white); transform: translateY(-4px); box-shadow: var(--shadow-hover); }
        .timer-card.done { border-color: var(--amber); background: #fffcf5; animation: shake 0.5s infinite alternate; }
        @keyframes shake { from { transform: rotate(-1deg); } to { transform: rotate(1deg); } }
        .task-name { font-size: 1.1rem; font-weight: 700; border: none; background: transparent; outline: none; color: var(--ink-mid); width: 80%; border-bottom: 2px solid transparent; }
        .task-name:focus { border-bottom-color: var(--sage); }
        .time-display { display: flex; justify-content: center; align-items: center; gap: 0.2rem; }
        .time-input { font-family: 'Varela Round', sans-serif; font-size: 3.5rem; font-weight: 900; width: 2.2ch; text-align: center; border: none; background: transparent; outline: none; color: var(--ink); border-radius: 0.5rem; }
        .time-input:focus { background: var(--sage-pale); }
        .status-badge { font-size: 0.75rem; text-align: center; font-weight: 700; color: var(--ink-soft); padding: 0.5rem; background: rgba(0,0,0,0.04); border-radius: 2rem; }
        .delete-btn { position: absolute; top: 1rem; right: 1rem; background: rgba(0,0,0,0.05); border: none; cursor: pointer; width: 26px; height: 26px; border-radius: 50%; color: #999; z-index: 20; }
        .delete-btn:hover { background: #ff5f5f; color: white; }
        .add-card { border: 2px dashed var(--sage-light); border-radius: 1.25rem; height: 215px; display: grid; place-items: center; cursor: pointer; color: var(--sage); font-weight: 800; transition: all 0.2s; }
        .add-card:hover { background: var(--sage-pale); transform: scale(1.02); }
        .loading-overlay { position: fixed; inset: 0; background: var(--parchment); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">載入中...</div>

<header>
    <div class="brand">
        <h1 class="brand-title">計時<span>器</span></h1>
    </div>
    <div>
        <div class="sync-dot" id="sync-dot"></div>
        <span class="sync-label" id="sync-label">連接中</span>
    </div>
</header>

<div class="grid-wrap" id="timer-grid"></div>

<script>
    const CONFIG = {
        URL: 'https://zhcahednvdamivzlwziz.supabase.co',
        KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoY2FoZWRudmRhbWl2emx3eml6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTM4MTIsImV4cCI6MjA4OTg4OTgxMn0.W1R1dddjcP28QKqECH4bELwMq3eSWCB0lJUMLtzQp04',
        TABLE: 'timers'
    };

    const { createClient } = supabase;
    const db = createClient(CONFIG.URL, CONFIG.KEY);
    let timers = [];
    let activeEditingId = null; 

    const playBeep = () => {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const osc = context.createOscillator();
        const gain = context.createGain();
        osc.connect(gain); gain.connect(context.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.5, context.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.5);
        osc.start(); osc.stop(context.currentTime + 0.5);
    };

    async function fetchTimers() {
        const { data } = await db.from(CONFIG.TABLE).select('*').order('created_at', { ascending: true });
        timers = (data || []).map(t => ({
            ...t,
            endTime: t.is_active ? Date.now() + (t.remaining_seconds * 1000) : null
        }));
        renderAll();
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('sync-dot').className = 'sync-dot synced';
        document.getElementById('sync-label').textContent = '已同步';
    }

    const renderAll = () => {
        if (activeEditingId) return; 
        const grid = document.getElementById('timer-grid');
        grid.innerHTML = '';
        
        const sorted = [...timers].sort((a, b) => (b.is_active - a.is_active) || (a.remaining_seconds - b.remaining_seconds));
        
        sorted.forEach(t => grid.appendChild(createCard(t)));
        
        const addBtn = document.createElement('div');
        addBtn.className = 'add-card';
        addBtn.innerHTML = '＋ 新增任務';
        addBtn.onclick = async () => {
            await db.from(CONFIG.TABLE).insert([{ name: '新任務', initial_seconds: 0, remaining_seconds: 0, is_active: false }]);
        };
        grid.appendChild(addBtn);
    };

    const createCard = (t) => {
        const isDone = t.remaining_seconds <= 0 && !t.is_active && t.initial_seconds > 0;
        const card = document.createElement('div');
        card.className = `timer-card ${t.is_active ? 'running' : ''} ${isDone ? 'done' : ''}`;
        card.dataset.id = t.id;

        const mins = String(Math.floor(t.remaining_seconds / 60)).padStart(2, '0');
        const secs = String(t.remaining_seconds % 60).padStart(2, '0');

        card.innerHTML = `
            <button class="delete-btn" onclick="event.stopPropagation(); deleteTimer('${t.id}')">✕</button>
            <input class="task-name" value="${t.name}" onfocus="activeEditingId='${t.id}'" onblur="handleNameBlur(this, '${t.id}')">
            <div class="time-display">
                <input type="number" class="time-input" data-type="min" value="${mins}" onfocus="handleInputFocus(this, '${t.id}')" onblur="handleTimeBlur(this, '${t.id}', 'min')">
                <span>:</span>
                <input type="number" class="time-input" data-type="sec" value="${secs}" onfocus="handleInputFocus(this, '${t.id}')" onblur="handleTimeBlur(this, '${t.id}', 'sec')">
            </div>
            <div class="status-badge">${t.is_active ? '正在計時' : (isDone ? '已結束' : '點擊開始')}</div>
        `;

        card.onclick = (e) => {
            if (e.target.tagName !== 'INPUT') toggleTimer(t.id);
        };
        
        card.querySelectorAll('input').forEach(input => {
            input.onkeydown = (e) => { 
                if (e.key === 'Enter') {
                    input.blur(); // 觸發 handleTimeBlur
                } 
            };
        });

        return card;
    };

    const handleInputFocus = (el, id) => {
        activeEditingId = id;
        el.select();
    };

    const handleNameBlur = async (el, id) => {
        const timer = timers.find(t => t.id === id);
        if (timer) timer.name = el.value;
        activeEditingId = null;
        await db.from(CONFIG.TABLE).update({ name: el.value }).eq('id', id);
        renderAll();
    };

    const handleTimeBlur = async (el, id, type) => {
        const timer = timers.find(t => t.id === id);
        if (!timer) return;

        // 讀取當前卡片中兩個輸入框的最新值
        const card = document.querySelector(`.timer-card[data-id="${id}"]`);
        const mVal = parseInt(card.querySelector('[data-type="min"]').value) || 0;
        const sVal = parseInt(card.querySelector('[data-type="sec"]').value) || 0;

        const total = (Math.min(99, mVal) * 60) + Math.min(59, sVal);
        
        timer.remaining_seconds = total;
        timer.initial_seconds = total;
        timer.is_active = false;
        timer.endTime = null;

        activeEditingId = null; 
        
        // 核心修正：如果設定的時間大於 0，輸入完後直接觸發開始
        if (total > 0) {
            await toggleTimer(id); 
        } else {
            renderAll();
            await db.from(CONFIG.TABLE).update({ remaining_seconds: 0, initial_seconds: 0, is_active: false }).eq('id', id);
        }
    };

    const toggleTimer = async (id) => {
        const t = timers.find(x => x.id === id);
        if (!t) return;

        // 如果是已結束狀態，點擊重設
        if (t.remaining_seconds <= 0 && !t.is_active && t.initial_seconds > 0) {
            t.remaining_seconds = 0; t.initial_seconds = 0; t.is_active = false;
            renderAll();
            await db.from(CONFIG.TABLE).update({ remaining_seconds: 0, initial_seconds: 0, is_active: false }).eq('id', id);
            return;
        }

        if (t.remaining_seconds <= 0) return;

        t.is_active = !t.is_active;
        t.endTime = t.is_active ? Date.now() + (t.remaining_seconds * 1000) : null;
        
        renderAll();
        await db.from(CONFIG.TABLE).update({ 
            is_active: t.is_active, 
            remaining_seconds: t.remaining_seconds, 
            initial_seconds: t.initial_seconds 
        }).eq('id', id);
    };

    async function deleteTimer(id) {
        await db.from(CONFIG.TABLE).delete().eq('id', id);
    }

    db.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: CONFIG.TABLE }, (p) => {
        if (activeEditingId) return;
        if (p.eventType === 'INSERT') {
            timers.push({...p.new, endTime: null});
        }
        if (p.eventType === 'DELETE') {
            timers = timers.filter(x => x.id !== p.old.id);
        }
        if (p.eventType === 'UPDATE') {
            const t = timers.find(x => x.id === p.new.id);
            if (t) {
                const stateChanged = t.is_active !== p.new.is_active;
                t.name = p.new.name;
                t.remaining_seconds = p.new.remaining_seconds;
                t.initial_seconds = p.new.initial_seconds;
                t.is_active = p.new.is_active;
                if (stateChanged) t.endTime = t.is_active ? Date.now() + (t.remaining_seconds * 1000) : null;
            }
        }
        renderAll();
    }).subscribe();

    setInterval(() => {
        const now = Date.now();
        let finished = false;
        timers.forEach(t => {
            if (t.is_active && t.endTime) {
                const diff = Math.ceil((t.endTime - now) / 1000);
                if (diff <= 0) {
                    t.remaining_seconds = 0; t.is_active = false; t.endTime = null;
                    playBeep(); finished = true;
                    db.from(CONFIG.TABLE).update({ remaining_seconds: 0, is_active: false }).eq('id', t.id);
                } else if (diff !== t.remaining_seconds) {
                    t.remaining_seconds = diff;
                    updateCardDisplay(t);
                }
            }
        });
        if (finished) renderAll();
    }, 200);

    function updateCardDisplay(t) {
        if (activeEditingId === t.id) return;
        const card = document.querySelector(`.timer-card[data-id="${t.id}"]`);
        if (!card) return;
        const mInput = card.querySelector('[data-type="min"]');
        const sInput = card.querySelector('[data-type="sec"]');
        if (mInput) mInput.value = String(Math.floor(t.remaining_seconds / 60)).padStart(2, '0');
        if (sInput) sInput.value = String(t.remaining_seconds % 60).padStart(2, '0');
    }

    fetchTimers();
</script>
</body>
</html>
