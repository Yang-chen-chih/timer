<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計時器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Varela+Round&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --sage: #7a9e5a; --sage-light: #b5d18c; --sage-pale: #e8f3db; --sage-deep: #4e7035;
            --ink: #1c2712; --ink-mid: #3d4f2a; --ink-soft: #6b7f57; --ink-faint: #9ab07f;
            --parchment: #f2f7ea; --cream: #fdfef9; --amber: #d4830a; --amber-pale: #fff7e6;
            --red: #c0392b; --red-pale: #fff0ee;
            --white: #ffffff;
            --card-border: rgba(122,158,90,0.2);
            --shadow-card: 0 1px 12px rgba(28,39,18,0.07), 0 1px 3px rgba(28,39,18,0.04);
            --shadow-hover: 0 6px 32px rgba(28,39,18,0.12), 0 2px 8px rgba(28,39,18,0.06);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--parchment);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 6rem;
        }

        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image:
                radial-gradient(ellipse 80% 55% at 10% 15%, rgba(181,209,140,0.22) 0%, transparent 60%),
                radial-gradient(ellipse 50% 70% at 88% 80%, rgba(122,158,90,0.13) 0%, transparent 55%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(212,131,10,0.04) 0%, transparent 70%);
        }

        header {
            position: relative; z-index: 20;
            padding: 1.75rem 2.5rem 0;
            display: flex; align-items: flex-end; justify-content: space-between;
        }
        .brand-title {
            font-family: 'Nunito', sans-serif;
            font-size: 2.4rem; font-weight: 900; color: var(--ink);
            letter-spacing: -0.03em;
        }
        .brand-title span { color: var(--sage); }
        .sync-area { display: flex; align-items: center; gap: 6px; padding-bottom: 4px; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; transition: all 0.4s; }
        .sync-dot.synced { background: #6ab84a; box-shadow: 0 0 0 3px rgba(106,184,74,0.2); }
        .sync-label { font-size: 0.7rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; }

        .upcoming-bar {
            position: relative; z-index: 20;
            margin: 1.25rem 2.5rem 0;
            background: var(--cream);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            padding: 0.75rem 1.25rem;
            display: flex; align-items: center; gap: 0.5rem;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            min-height: 52px;
        }
        .upcoming-bar::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
            background: linear-gradient(180deg, var(--sage-light) 0%, var(--sage) 100%);
            border-radius: 4px 0 0 4px;
        }
        .upcoming-label {
            font-size: 0.7rem; font-weight: 700; color: var(--ink-soft);
            text-transform: uppercase; letter-spacing: 0.07em;
            white-space: nowrap; padding-left: 0.25rem;
        }
        .upcoming-chips { display: flex; gap: 0.5rem; flex-wrap: wrap; flex: 1; }
        .upcoming-chip {
            display: flex; align-items: center; gap: 6px;
            background: var(--sage-pale);
            border: 1px solid rgba(122,158,90,0.25);
            border-radius: 2rem;
            padding: 4px 10px 4px 8px;
            font-size: 0.75rem; color: var(--ink-mid); font-weight: 700;
            transition: all 0.3s;
        }
        .upcoming-chip.urgent { background: var(--amber-pale); border-color: rgba(212,131,10,0.3); color: #7a4800; animation: pulse-chip 1.2s ease-in-out infinite; }
        .upcoming-chip.critical { background: var(--red-pale); border-color: rgba(192,57,43,0.3); color: #7a1a10; animation: pulse-chip 0.7s ease-in-out infinite; }
        @keyframes pulse-chip { 0%, 100% { opacity: 1; } 50% { opacity: 0.65; } }
        .chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sage); flex-shrink: 0; }
        .chip-dot.urgent { background: var(--amber); }
        .chip-dot.critical { background: var(--red); }
        .chip-name { max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chip-time { font-family: 'Varela Round', sans-serif; font-size: 0.8rem; }
        .upcoming-empty { font-size: 0.8rem; color: var(--ink-faint); padding-left: 0.25rem; font-style: italic; }

        .stats-strip {
            position: relative; z-index: 15;
            margin: 0 2.5rem;
            display: flex; gap: 0.75rem;
        }
        .stat-pill {
            background: var(--cream); border: 1px solid var(--card-border);
            border-radius: 2rem; padding: 0.35rem 0.85rem;
            display: flex; align-items: center; gap: 6px;
            font-size: 0.72rem; color: var(--ink-soft); font-weight: 700;
        }
        .stat-pill-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sage-light); }
        .stat-pill-dot.active { background: var(--sage); box-shadow: 0 0 0 2px rgba(122,158,90,0.2); }
        .stat-pill-num { font-family: 'Varela Round', sans-serif; font-size: 0.85rem; color: var(--ink-mid); }

        .grid-wrap {
            position: relative; z-index: 10;
            padding: 1.5rem 2.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 1.2rem;
            align-items: start;
        }

        .timer-card {
            background: var(--cream);
            border: 1.5px solid rgba(122,158,90,0.12);
            border-radius: 1.1rem;
            padding: 1.2rem 1.1rem 1rem;
            box-shadow: 0 1px 4px rgba(28,39,18,0.04);
            transition: all 0.35s ease;
            display: flex; flex-direction: column; gap: 0.3rem;
            cursor: pointer; position: relative; overflow: hidden;
            opacity: 0.7;
            filter: saturate(0.5);
        }
        .timer-card:hover {
            opacity: 0.9; filter: saturate(0.8);
            box-shadow: var(--shadow-hover); transform: translateY(-1px);
            border-color: rgba(122,158,90,0.3);
        }

        .timer-card.running {
            background: var(--white);
            border: 2px solid rgba(122,158,90,0.55);
            border-radius: 1.25rem;
            padding: 1.4rem 1.3rem 1.2rem;
            opacity: 1; filter: saturate(1);
            transform: translateY(-4px) scale(1.02);
            box-shadow:
                0 8px 36px rgba(28,39,18,0.13),
                0 2px 8px rgba(28,39,18,0.07),
                0 0 0 4px rgba(122,158,90,0.1),
                inset 0 0 0 1px rgba(181,209,140,0.4);
            z-index: 5;
        }
        .timer-card.running:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow:
                0 12px 44px rgba(28,39,18,0.16),
                0 3px 10px rgba(28,39,18,0.09),
                0 0 0 5px rgba(122,158,90,0.12);
        }

        .timer-card.done {
            border: 2px solid rgba(212,131,10,0.55);
            background: var(--amber-pale);
            opacity: 1; filter: saturate(1);
            transform: translateY(-2px);
            animation: shake 0.45s infinite alternate;
            box-shadow: 0 4px 20px rgba(212,131,10,0.2), 0 0 0 4px rgba(212,131,10,0.08);
        }
        @keyframes shake {
            from { transform: rotate(-0.8deg) scale(1.01); }
            to   { transform: rotate(0.8deg) scale(1.01); }
        }

        .timer-card.running.urgent-card {
            border-color: rgba(212,131,10,0.55);
            box-shadow: 0 8px 36px rgba(212,131,10,0.15), 0 0 0 4px rgba(212,131,10,0.1);
        }
        .timer-card.running.critical-card {
            border-color: rgba(192,57,43,0.55);
            box-shadow: 0 8px 36px rgba(192,57,43,0.15), 0 0 0 4px rgba(192,57,43,0.1);
        }

        .timer-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
            background: transparent; border-radius: 3px 0 0 3px; transition: background 0.3s;
        }
        .timer-card.running::before { background: linear-gradient(180deg, var(--sage-light) 0%, var(--sage) 100%); }
        .timer-card.done::before { background: linear-gradient(180deg, #f5c842 0%, var(--amber) 100%); }
        .timer-card.running.urgent-card::before { background: linear-gradient(180deg, #f5c842 0%, var(--amber) 100%); }
        .timer-card.running.critical-card::before { background: linear-gradient(180deg, #f5a0a0 0%, var(--red) 100%); }

        @keyframes pulse-ring {
            0%   { transform: scale(1);    opacity: 0.45; }
            70%  { transform: scale(1.12); opacity: 0; }
            100% { transform: scale(1);    opacity: 0; }
        }
        .pulse-ring {
            position: absolute; inset: -6px; border-radius: 1.35rem;
            border: 2px solid rgba(122,158,90,0.4);
            pointer-events: none; display: none;
            animation: pulse-ring 2s ease-out infinite;
        }
        .timer-card.running .pulse-ring { display: block; }
        .timer-card.running.urgent-card .pulse-ring { border-color: rgba(212,131,10,0.4); animation-duration: 1.3s; }
        .timer-card.running.critical-card .pulse-ring { border-color: rgba(192,57,43,0.45); animation-duration: 0.8s; }

        .running-badge {
            display: none;
            position: absolute; top: 0.65rem; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, var(--sage-deep), var(--sage));
            color: white; font-size: 0.6rem; font-weight: 900;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 2px 10px; border-radius: 2rem; z-index: 10;
            box-shadow: 0 2px 6px rgba(78,112,53,0.3);
        }
        .timer-card.running .running-badge { display: block; }
        .timer-card.running.urgent-card .running-badge { background: linear-gradient(90deg, #b87400, var(--amber)); }
        .timer-card.running.critical-card .running-badge { background: linear-gradient(90deg, #8b1a10, var(--red)); }

        .progress-ring-wrap {
            position: absolute; top: 0.8rem; right: 0.8rem;
            width: 32px; height: 32px; opacity: 0; transition: opacity 0.35s;
        }
        .timer-card.running .progress-ring-wrap { opacity: 1; }
        .progress-ring-bg { fill: none; stroke: var(--sage-pale); stroke-width: 3; }
        .progress-ring-fg { fill: none; stroke: var(--sage); stroke-width: 3; stroke-linecap: round; }

        .task-name {
            font-size: 0.88rem; font-weight: 700;
            border: none; background: transparent; outline: none;
            color: var(--ink-soft); width: 78%;
            border-bottom: 2px solid transparent; padding-bottom: 1px;
            transition: border-color 0.2s, color 0.3s; margin-top: 1.4rem;
        }
        .timer-card.running .task-name { color: var(--ink-mid); font-size: 0.95rem; }
        .task-name:focus { border-bottom-color: var(--sage); }
        .timer-card.done .task-name { color: #7a4800; }

        .time-display {
            display: flex; justify-content: center; align-items: center; margin: 0.1rem 0;
        }
        .time-input {
            font-family: 'Varela Round', sans-serif;
            font-size: 3.0rem; font-weight: 900;
            width: 1.65em; padding: 0; text-align: center;
            border: none; background: transparent; outline: none;
            color: rgba(28,39,18,0.35); border-radius: 0.4rem;
            -moz-appearance: textfield; transition: background 0.15s, color 0.3s, font-size 0.3s;
        }
        .time-input::-webkit-outer-spin-button,
        .time-input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .time-input:focus { background: var(--sage-pale); }
        .timer-card.running .time-input { font-size: 3.8rem; color: var(--ink); }
        .timer-card.done .time-input { color: var(--amber); font-size: 3.0rem; }
        .timer-card.running.critical-card .time-input { color: var(--red); }
        .timer-card.running.urgent-card .time-input { color: var(--amber); }

        .time-separator {
            font-size: 2.6rem; font-weight: 900; line-height: 1; margin-bottom: 0.35rem;
            color: rgba(122,158,90,0.25); transition: color 0.3s, font-size 0.3s;
        }
        .timer-card.running .time-separator { font-size: 3.2rem; color: rgba(122,158,90,0.6); }
        .timer-card.done .time-separator { color: rgba(212,131,10,0.5); }
        .timer-card.running.critical-card .time-separator { color: rgba(192,57,43,0.5); }
        .timer-card.running.urgent-card .time-separator { color: rgba(212,131,10,0.5); }



        .status-badge {
            font-size: 0.65rem; text-align: center; font-weight: 700;
            color: rgba(155,176,127,0.7); padding: 0.25rem 0.5rem;
            background: transparent; border-radius: 2rem; margin-top: 0.1rem;
            text-transform: uppercase; letter-spacing: 0.07em; transition: all 0.3s;
        }
        .timer-card.running .status-badge { background: rgba(122,158,90,0.1); color: var(--sage-deep); }
        .timer-card.done .status-badge { background: rgba(212,131,10,0.12); color: var(--amber); }
        .timer-card.running.urgent-card .status-badge { background: rgba(212,131,10,0.1); color: #b87400; }
        .timer-card.running.critical-card .status-badge { background: rgba(192,57,43,0.1); color: var(--red); }

        .delete-btn {
            position: absolute; top: 0.65rem; right: 0.65rem;
            background: rgba(0,0,0,0.04); border: none; cursor: pointer;
            width: 22px; height: 22px; border-radius: 50%;
            color: #bbb; z-index: 20;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; transition: all 0.2s;
        }
        .delete-btn:hover { background: #ff5f5f; color: white; }
        .timer-card.running .delete-btn { display: none; }

        .add-card {
            border: 2px dashed rgba(122,158,90,0.3); border-radius: 1.1rem;
            min-height: 150px; display: grid; place-items: center;
            cursor: pointer; color: rgba(122,158,90,0.5); font-weight: 800;
            font-size: 0.9rem; transition: all 0.2s; letter-spacing: 0.02em; opacity: 0.7;
        }
        .add-card:hover { background: var(--sage-pale); transform: scale(1.02); border-color: var(--sage); opacity: 1; color: var(--sage); }
        .add-card-inner { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
        .add-icon { font-size: 1.6rem; opacity: 0.5; }

        .loading-overlay {
            position: fixed; inset: 0; background: var(--parchment); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s; gap: 1rem;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loader-spinner {
            width: 32px; height: 32px; border: 3px solid var(--sage-pale);
            border-top-color: var(--sage); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { color: var(--ink-soft); font-size: 0.85rem; }

        .section-label {
            grid-column: 1 / -1;
            font-size: 0.68rem; font-weight: 700; color: var(--ink-soft);
            text-transform: uppercase; letter-spacing: 0.1em;
            display: flex; align-items: center; gap: 0.6rem; margin-top: 0.4rem;
        }
        .section-label::after { content: ''; flex: 1; height: 1px; background: rgba(122,158,90,0.15); }
        .section-label.idle-label { color: var(--ink-faint); margin-top: 0.8rem; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div class="loader-spinner"></div>
    <span class="loader-text">載入中…</span>
</div>

<header>
    <div class="brand">
        <h1 class="brand-title">計時<span>器</span></h1>
    </div>
    <div class="sync-area">
        <div class="sync-dot" id="sync-dot"></div>
        <span class="sync-label" id="sync-label">連接中</span>
    </div>
</header>

<div class="upcoming-bar" id="upcoming-bar">
    <span class="upcoming-label">即將完成</span>
    <div class="upcoming-chips" id="upcoming-chips">
        <span class="upcoming-empty">目前沒有進行中的計時</span>
    </div>
</div>

<div class="stats-strip" id="stats-strip" style="margin-top:0.9rem;">
    <div class="stat-pill">
        <div class="stat-pill-dot active"></div>
        <span>進行中</span>
        <span class="stat-pill-num" id="stat-active">0</span>
    </div>
    <div class="stat-pill">
        <div class="stat-pill-dot"></div>
        <span>全部</span>
        <span class="stat-pill-num" id="stat-total">0</span>
    </div>
</div>

<div class="grid-wrap" id="timer-grid"></div>

<script>
    const CONFIG = {
        URL: 'https://zhcahednvdamivzlwziz.supabase.co',
        KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoY2FoZWRudmRhbWl2emx3eml6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTM4MTIsImV4cCI6MjA4OTg4OTgxMn0.W1R1dddjcP28QKqECH4bELwMq3eSWCB0lJUMLtzQp04',
        TABLE: 'timers'
    };

    const { createClient } = supabase;
    const db = createClient(CONFIG.URL, CONFIG.KEY);
    let timers = [];
    let activeEditingId = null;
    let rafId = null;

    // ─── 精確音效 ──────────────────────────────────────────────────────────────
    const playBeep = () => {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            [880, 1100, 880].forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = freq;
                const start = ctx.currentTime + i * 0.18;
                gain.gain.setValueAtTime(0.4, start);
                gain.gain.exponentialRampToValueAtTime(0.01, start + 0.15);
                osc.start(start); osc.stop(start + 0.18);
            });
        } catch(e) {}
    };

    // ─── 即將完成列 ────────────────────────────────────────────────────────────
    function updateUpcomingBar() {
        const chips = document.getElementById('upcoming-chips');
        const now = performance.now();
        const active = timers
            .filter(t => t.is_active && t.endPerf !== null && t.endPerf - now > 0)
            .sort((a, b) => a.endPerf - b.endPerf);
        if (active.length === 0) {
            chips.innerHTML = '<span class="upcoming-empty">目前沒有進行中的計時</span>';
            return;
        }
        chips.innerHTML = active.map(t => {
            const ms = t.endPerf - now;
            const s = Math.ceil(ms / 1000);
            const m = Math.floor(s / 60), sec = s % 60;
            const timeStr = m > 0 ? `${m}分${sec > 0 ? sec + '秒' : ''}` : `${sec}秒`;
            const urgent = ms <= 60000 && ms > 20000;
            const critical = ms <= 20000;
            const cls = critical ? 'critical' : urgent ? 'urgent' : '';
            const name = (t.name || '任務').substring(0, 10);
            return `<div class="upcoming-chip ${cls}">
                <div class="chip-dot ${cls}"></div>
                <span class="chip-name">${name}</span>
                <span class="chip-time">${timeStr}</span>
            </div>`;
        }).join('');
    }

    function updateStats() {
        document.getElementById('stat-active').textContent = timers.filter(t => t.is_active).length;
        document.getElementById('stat-total').textContent = timers.length;
    }

    // ─── 載入資料 ───────────────────────────────────────────────────────────────
    async function fetchTimers() {
        const { data } = await db.from(CONFIG.TABLE).select('*').order('created_at', { ascending: true });
        timers = (data || []).map(t => ({
            ...t,
            // endPerf：使用 performance.now() 基準的絕對截止點，精度 < 1ms
            endPerf: t.is_active ? performance.now() + (t.remaining_seconds * 1000) : null
        }));
        renderAll();
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('sync-dot').className = 'sync-dot synced';
        document.getElementById('sync-label').textContent = '已同步';
        startRAF();
    }

    // ─── 渲染全部卡片 ───────────────────────────────────────────────────────────
    const renderAll = () => {
        if (activeEditingId) return;
        const grid = document.getElementById('timer-grid');
        grid.innerHTML = '';

        const running = timers.filter(t => t.is_active).sort((a, b) => (a.endPerf || 0) - (b.endPerf || 0));
        const idle = timers.filter(t => !t.is_active);

        if (running.length > 0) {
            const lbl = document.createElement('div');
            lbl.className = 'section-label';
            lbl.innerHTML = `▶ 計時中（${running.length}）`;
            grid.appendChild(lbl);
            running.forEach(t => grid.appendChild(createCard(t)));
        }
        if (idle.length > 0) {
            const lbl = document.createElement('div');
            lbl.className = 'section-label idle-label';
            lbl.innerHTML = `待機（${idle.length}）`;
            grid.appendChild(lbl);
            idle.forEach(t => grid.appendChild(createCard(t)));
        }

        const addBtn = document.createElement('div');
        addBtn.className = 'add-card';
        addBtn.innerHTML = `<div class="add-card-inner"><div class="add-icon">＋</div><span>新增任務</span></div>`;
        addBtn.onclick = async () => {
            await db.from(CONFIG.TABLE).insert([{ name: '新任務', initial_seconds: 0, remaining_seconds: 0, is_active: false }]);
        };
        grid.appendChild(addBtn);

        updateUpcomingBar();
        updateStats();
        updateTabTitle();
    };

    // ─── 建立卡片 DOM ──────────────────────────────────────────────────────────
    const createCard = (t) => {
        const now = performance.now();
        const msLeft = t.is_active && t.endPerf ? Math.max(0, t.endPerf - now) : (t.remaining_seconds * 1000);
        const secsLeft = Math.ceil(msLeft / 1000);

        const isDone = t.remaining_seconds <= 0 && !t.is_active && t.initial_seconds > 0;
        const isUrgent = t.is_active && msLeft <= 60000 && msLeft > 20000;
        const isCritical = t.is_active && msLeft <= 20000 && msLeft > 0;

        const card = document.createElement('div');
        let cardClass = 'timer-card';
        if (t.is_active) cardClass += ' running';
        if (isDone) cardClass += ' done';
        if (isUrgent) cardClass += ' urgent-card';
        if (isCritical) cardClass += ' critical-card';
        card.className = cardClass;
        card.dataset.id = t.id;

        const displaySecs = t.is_active ? secsLeft : t.remaining_seconds;
        const mins = String(Math.floor(displaySecs / 60)).padStart(2, '0');
        const secs = String(displaySecs % 60).padStart(2, '0');

        const progress = t.initial_seconds > 0
            ? Math.max(0, Math.min(1, msLeft / (t.initial_seconds * 1000))) : 0;
        const r = 12; const circ = 2 * Math.PI * r;
        const offset = circ * (1 - progress);
        const ringColor = isCritical ? '#c0392b' : isUrgent ? '#d4830a' : '#7a9e5a';

        let statusText = '點擊開始';
        if (t.is_active) statusText = isCritical ? '即將完成' : isUrgent ? '快要結束' : '正在計時';
        if (isDone) statusText = '已結束';
        let badgeLabel = '';
        if (t.is_active) badgeLabel = isCritical ? '🔴 即將完成' : isUrgent ? '🟡 快要結束' : '▶ 計時中';

        card.innerHTML = `
            <div class="pulse-ring"></div>
            ${t.is_active ? `<div class="running-badge">${badgeLabel}</div>` : ''}
            <button class="delete-btn" onclick="event.stopPropagation(); deleteTimer('${t.id}')">✕</button>
            <svg class="progress-ring-wrap" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" style="transform:rotate(-90deg)">
                <circle class="progress-ring-bg" cx="16" cy="16" r="${r}"/>
                <circle class="progress-ring-fg" cx="16" cy="16" r="${r}"
                    stroke="${ringColor}"
                    stroke-dasharray="${circ.toFixed(3)}"
                    stroke-dashoffset="${offset.toFixed(3)}"/>
            </svg>
            <input class="task-name" value="${(t.name || '').replace(/"/g, '&quot;')}"
                onfocus="activeEditingId='${t.id}'"
                onblur="handleNameBlur(this,'${t.id}')">
            <div class="time-display">
                <input type="number" class="time-input" data-type="min" value="${mins}"
                    onfocus="handleInputFocus(this,'${t.id}')"
                    onblur="handleTimeBlur(this,'${t.id}','min')">
                <span class="time-separator">:</span>
                <input type="number" class="time-input" data-type="sec" value="${secs}"
                    onfocus="handleInputFocus(this,'${t.id}')"
                    onblur="handleTimeBlur(this,'${t.id}','sec')">
            </div>
            <div class="status-badge">${statusText}</div>
        `;

        card.onclick = (e) => { if (e.target.tagName !== 'INPUT') toggleTimer(t.id); };
        card.querySelectorAll('input').forEach(inp => {
            inp.onkeydown = (e) => { if (e.key === 'Enter') inp.blur(); };
        });
        return card;
    };

    // ─── RAF 精確更新迴圈 ───────────────────────────────────────────────────────
    // 使用 requestAnimationFrame（~60fps，與螢幕垂直同步）
    // 不再用 setInterval，消除 timer drift
    let lastRenderSec = {}; // id -> last displayed second (for whole-second re-render trigger)

    function startRAF() {
        if (rafId) cancelAnimationFrame(rafId);
        rafLoop();
    }

    function rafLoop() {
        rafId = requestAnimationFrame(rafLoop);
        const now = performance.now();
        let needFullRender = false;

        timers.forEach(t => {
            if (!t.is_active || t.endPerf === null) return;
            const msLeft = t.endPerf - now;

            if (msLeft <= 0) {
                // 計時結束
                t.remaining_seconds = 0;
                t.is_active = false;
                t.endPerf = null;
                delete lastRenderSec[t.id];
                playBeep();
                needFullRender = true;
                db.from(CONFIG.TABLE).update({ remaining_seconds: 0, is_active: false }).eq('id', t.id);
                return;
            }

            // 當前應顯示的秒數（向上取整，讓 1 秒整時跳到 0 而非停在 1）
            const secsNow = Math.ceil(msLeft / 1000);
            const lastSec = lastRenderSec[t.id];

            // 跨越秒邊界或第一次：同步 remaining_seconds 並偵測是否需全刷
            if (lastSec !== secsNow) {
                lastRenderSec[t.id] = secsNow;
                t.remaining_seconds = secsNow;

                // urgency 等級改變 → 需要全刷卡片
                const wasUrgent = lastSec !== undefined && lastSec <= 60 && lastSec > 20;
                const wasCritical = lastSec !== undefined && lastSec <= 20;
                const isUrgent = secsNow <= 60 && secsNow > 20;
                const isCritical = secsNow <= 20;
                if (wasUrgent !== isUrgent || wasCritical !== isCritical) {
                    needFullRender = true;
                } else {
                    updateCardDisplay(t, msLeft);
                }
            } else {
                // 同一秒內：進度環平滑更新
                updateCardRing(t, msLeft);
            }
        });

        if (needFullRender) {
            renderAll();
        } else {
            updateUpcomingBar();
            updateTabTitle();
        }
    }

    // 更新卡片的分:秒 + 圓環（整秒跳變時呼叫）
    function updateCardDisplay(t, msLeft) {
        if (activeEditingId === t.id) return;
        const card = document.querySelector(`.timer-card[data-id="${t.id}"]`);
        if (!card) return;

        const secsLeft = Math.ceil(msLeft / 1000);
        const mInput = card.querySelector('[data-type="min"]');
        const sInput = card.querySelector('[data-type="sec"]');
        if (mInput) mInput.value = String(Math.floor(secsLeft / 60)).padStart(2, '0');
        if (sInput) sInput.value = String(secsLeft % 60).padStart(2, '0');

        updateCardRing(t, msLeft);

        // 狀態文字
        const badge = card.querySelector('.status-badge');
        if (badge) {
            const isCritical = msLeft <= 20000;
            const isUrgent = msLeft <= 60000 && !isCritical;
            badge.textContent = isCritical ? '即將完成' : isUrgent ? '快要結束' : '正在計時';
        }
    }

    // 平滑更新進度環（60fps）
    function updateCardRing(t, msLeft) {
        if (activeEditingId === t.id) return;
        const card = document.querySelector(`.timer-card[data-id="${t.id}"]`);
        if (!card) return;
        const r = 12; const circ = 2 * Math.PI * r;
        const progress = t.initial_seconds > 0 ? Math.max(0, msLeft / (t.initial_seconds * 1000)) : 0;
        const ring = card.querySelector('.progress-ring-fg');
        if (ring) {
            ring.setAttribute('stroke-dashoffset', (circ * (1 - progress)).toFixed(3));
            const isCritical = msLeft <= 20000;
            const isUrgent = msLeft <= 60000 && !isCritical;
            ring.setAttribute('stroke', isCritical ? '#c0392b' : isUrgent ? '#d4830a' : '#7a9e5a');
        }
    }

    // ─── Tab 標題 ───────────────────────────────────────────────────────────────
    function updateTabTitle() {
        const now = performance.now();
        const active = timers.filter(t => t.is_active && t.endPerf && t.endPerf - now > 0)
            .sort((a, b) => a.endPerf - b.endPerf);
        if (active.length === 0) { document.title = '計時器'; return; }
        const t = active[0];
        const msLeft = t.endPerf - now;
        const secsLeft = Math.ceil(msLeft / 1000);
        const m = Math.floor(secsLeft / 60);
        const s = String(secsLeft % 60).padStart(2, '0');
        const icon = msLeft <= 20000 ? '🔴' : msLeft <= 60000 ? '🟡' : '🟢';
        document.title = `${icon} ${m}:${s} ${(t.name || '任務').substring(0, 8)}`;
    }

    // ─── 輸入事件 ──────────────────────────────────────────────────────────────
    const handleInputFocus = (el, id) => { activeEditingId = id; el.select(); };

    const handleNameBlur = async (el, id) => {
        const timer = timers.find(t => t.id === id);
        if (timer) timer.name = el.value;
        activeEditingId = null;
        await db.from(CONFIG.TABLE).update({ name: el.value }).eq('id', id);
        renderAll();
    };

    const handleTimeBlur = async (el, id, type) => {
        const timer = timers.find(t => t.id === id);
        if (!timer) return;
        const card = document.querySelector(`.timer-card[data-id="${id}"]`);
        if (!card) return;
        const mVal = parseInt(card.querySelector('[data-type="min"]').value) || 0;
        const sVal = parseInt(card.querySelector('[data-type="sec"]').value) || 0;
        const total = (Math.min(99, mVal) * 60) + Math.min(59, sVal);
        timer.remaining_seconds = total;
        timer.initial_seconds = total;
        timer.is_active = false;
        timer.endPerf = null;
        activeEditingId = null;
        if (total > 0) {
            await toggleTimer(id);
        } else {
            renderAll();
            await db.from(CONFIG.TABLE).update({ remaining_seconds: total, initial_seconds: total, is_active: false }).eq('id', id);
        }
    };

    // ─── 切換計時 ──────────────────────────────────────────────────────────────
    const toggleTimer = async (id) => {
        const t = timers.find(x => x.id === id);
        if (!t) return;
        if (t.remaining_seconds <= 0 && !t.is_active && t.initial_seconds > 0) {
            t.remaining_seconds = 0; t.initial_seconds = 0; t.is_active = false; t.endPerf = null;
            delete lastRenderSec[id];
            renderAll();
            await db.from(CONFIG.TABLE).update({ remaining_seconds: 0, initial_seconds: 0, is_active: false }).eq('id', id);
            return;
        }
        if (t.remaining_seconds <= 0) return;
        t.is_active = !t.is_active;
        // 以 performance.now() 精確設定截止點
        t.endPerf = t.is_active ? performance.now() + (t.remaining_seconds * 1000) : null;
        if (!t.is_active) delete lastRenderSec[id];
        renderAll();
        await db.from(CONFIG.TABLE).update({
            is_active: t.is_active,
            remaining_seconds: t.remaining_seconds,
            initial_seconds: t.initial_seconds
        }).eq('id', id);
    };

    async function deleteTimer(id) {
        await db.from(CONFIG.TABLE).delete().eq('id', id);
    }

    // ─── Supabase 即時同步 ─────────────────────────────────────────────────────
    db.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: CONFIG.TABLE }, (p) => {
        if (activeEditingId) return;
        if (p.eventType === 'INSERT') {
            timers.push({ ...p.new, endPerf: null });
        }
        if (p.eventType === 'DELETE') {
            timers = timers.filter(x => x.id !== p.old.id);
            delete lastRenderSec[p.old.id];
        }
        if (p.eventType === 'UPDATE') {
            const t = timers.find(x => x.id === p.new.id);
            if (t) {
                const wasActive = t.is_active;
                Object.assign(t, {
                    name: p.new.name,
                    remaining_seconds: p.new.remaining_seconds,
                    initial_seconds: p.new.initial_seconds,
                    is_active: p.new.is_active
                });
                // 重新計算 endPerf，避免跨裝置時間偏差（只在狀態改變時重置）
                if (!wasActive && t.is_active) {
                    t.endPerf = performance.now() + (t.remaining_seconds * 1000);
                } else if (!t.is_active) {
                    t.endPerf = null;
                    delete lastRenderSec[t.id];
                }
                // 若同步過來的 remaining_seconds 與本地差 > 2秒，修正截止點
                if (t.is_active && t.endPerf) {
                    const localSecs = Math.ceil((t.endPerf - performance.now()) / 1000);
                    if (Math.abs(localSecs - p.new.remaining_seconds) > 2) {
                        t.endPerf = performance.now() + (p.new.remaining_seconds * 1000);
                    }
                }
            }
        }
        renderAll();
    }).subscribe();

    fetchTimers();
</script>
</body>
</html>
