<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>計時器</title>
<link rel="icon" href="下載4.jpg" type="image/jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=Varela+Round&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#7a9e5a;--sage-l:#b5d18c;--sage-p:#e8f3db;--sage-d:#4e7035;
  --ink:#1c2712;--ink-m:#3d4f2a;--ink-s:#6b7f57;--ink-f:#9ab07f;
  --bg:#f2f7ea;--cream:#fdfef9;
  --amber:#d4830a;--amber-p:#fff7e6;
  --red:#c0392b;--red-p:#fff0ee;
  --cb:rgba(122,158,90,.2);
  --sh:0 1px 12px rgba(28,39,18,.07),0 1px 3px rgba(28,39,18,.04);
  --sh-h:0 6px 32px rgba(28,39,18,.12),0 2px 8px rgba(28,39,18,.06);
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;padding-bottom:6rem}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(ellipse 80% 55% at 10% 15%,rgba(181,209,140,.22) 0%,transparent 60%),
    radial-gradient(ellipse 50% 70% at 88% 80%,rgba(122,158,90,.13) 0%,transparent 55%),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(212,131,10,.04) 0%,transparent 70%)}

header{position:relative;z-index:20;padding:1.75rem 2.5rem 0;display:flex;align-items:flex-end;justify-content:space-between}
.brand-title{font-family:'Nunito',sans-serif;font-size:2.4rem;font-weight:900;color:var(--ink);letter-spacing:-.03em}
.brand-title span{color:var(--sage)}
.sync-area{display:flex;align-items:center;gap:6px;padding-bottom:4px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:all .4s}
.sync-dot.synced{background:#6ab84a;box-shadow:0 0 0 3px rgba(106,184,74,.2)}
.sync-label{font-size:.7rem;color:var(--ink-s);text-transform:uppercase;letter-spacing:.06em}

.upcoming-bar{position:relative;z-index:20;margin:1.25rem 2.5rem 0;background:var(--cream);
  border:1px solid var(--cb);border-radius:1rem;padding:.75rem 1.25rem;
  display:flex;align-items:center;gap:.5rem;overflow:hidden;box-shadow:var(--sh);min-height:52px}
.upcoming-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--sage-l),var(--sage));border-radius:4px 0 0 4px}
.upcoming-label{font-size:.7rem;font-weight:700;color:var(--ink-s);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;padding-left:.25rem}
.upcoming-chips{display:flex;gap:.5rem;flex-wrap:wrap;flex:1}
.upcoming-chip{display:flex;align-items:center;gap:6px;background:var(--sage-p);border:1px solid rgba(122,158,90,.25);
  border-radius:2rem;padding:4px 10px 4px 8px;font-size:.75rem;color:var(--ink-m);font-weight:700;transition:all .3s}
.upcoming-chip.urgent{background:var(--amber-p);border-color:rgba(212,131,10,.3);color:#7a4800;animation:pulse-chip 1.2s ease-in-out infinite}
.upcoming-chip.critical{background:var(--red-p);border-color:rgba(192,57,43,.3);color:#7a1a10;animation:pulse-chip .7s ease-in-out infinite}
@keyframes pulse-chip{0%,100%{opacity:1}50%{opacity:.65}}
.chip-dot{width:6px;height:6px;border-radius:50%;background:var(--sage);flex-shrink:0}
.chip-dot.urgent{background:var(--amber)}
.chip-dot.critical{background:var(--red)}
.chip-name{max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-time{font-family:'Varela Round',sans-serif;font-size:.8rem}
.upcoming-empty{font-size:.8rem;color:var(--ink-f);padding-left:.25rem;font-style:italic}

.stats-strip{position:relative;z-index:15;margin:0 2.5rem;display:flex;gap:.75rem}
.stat-pill{background:var(--cream);border:1px solid var(--cb);border-radius:2rem;padding:.35rem .85rem;
  display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--ink-s);font-weight:700}
.stat-pill-dot{width:7px;height:7px;border-radius:50%;background:var(--sage-l)}
.stat-pill-dot.active{background:var(--sage);box-shadow:0 0 0 2px rgba(122,158,90,.2)}
.stat-pill-num{font-family:'Varela Round',sans-serif;font-size:.85rem;color:var(--ink-m)}

.grid-wrap{position:relative;z-index:10;padding:1.5rem 2.5rem;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1.2rem;align-items:start}

.timer-card{background:var(--cream);border:1.5px solid rgba(122,158,90,.12);border-radius:1.1rem;
  padding:1.2rem 1.1rem 1rem;box-shadow:0 1px 4px rgba(28,39,18,.04);transition:all .35s ease;
  display:flex;flex-direction:column;gap:.3rem;cursor:pointer;position:relative;overflow:hidden;
  opacity:.7;filter:saturate(.5)}
.timer-card:hover{opacity:.9;filter:saturate(.8);box-shadow:var(--sh-h);transform:translateY(-1px);border-color:rgba(122,158,90,.3)}
.timer-card.running{background:#fff;border:2px solid rgba(122,158,90,.55);border-radius:1.25rem;
  padding:1.4rem 1.3rem 1.2rem;opacity:1;filter:saturate(1);transform:translateY(-4px) scale(1.02);z-index:5;
  box-shadow:0 8px 36px rgba(28,39,18,.13),0 2px 8px rgba(28,39,18,.07),0 0 0 4px rgba(122,158,90,.1),inset 0 0 0 1px rgba(181,209,140,.4)}
.timer-card.running:hover{transform:translateY(-6px) scale(1.02);
  box-shadow:0 12px 44px rgba(28,39,18,.16),0 3px 10px rgba(28,39,18,.09),0 0 0 5px rgba(122,158,90,.12)}
.timer-card.done{border:2px solid rgba(212,131,10,.55);background:var(--amber-p);opacity:1;filter:saturate(1);
  transform:translateY(-2px);animation:shake .45s infinite alternate;
  box-shadow:0 4px 20px rgba(212,131,10,.2),0 0 0 4px rgba(212,131,10,.08)}
@keyframes shake{from{transform:rotate(-.8deg) scale(1.01)}to{transform:rotate(.8deg) scale(1.01)}}
.timer-card.running.urgent-card{border-color:rgba(212,131,10,.55);box-shadow:0 8px 36px rgba(212,131,10,.15),0 0 0 4px rgba(212,131,10,.1)}
.timer-card.running.critical-card{border-color:rgba(192,57,43,.55);box-shadow:0 8px 36px rgba(192,57,43,.15),0 0 0 4px rgba(192,57,43,.1)}

.timer-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;border-radius:3px 0 0 3px;transition:background .3s}
.timer-card.running::before{background:linear-gradient(180deg,var(--sage-l),var(--sage))}
.timer-card.done::before,.timer-card.running.urgent-card::before{background:linear-gradient(180deg,#f5c842,var(--amber))}
.timer-card.running.critical-card::before{background:linear-gradient(180deg,#f5a0a0,var(--red))}

@keyframes pulse-ring{0%{transform:scale(1);opacity:.45}70%{transform:scale(1.12);opacity:0}100%{transform:scale(1);opacity:0}}
.pulse-ring{position:absolute;inset:-6px;border-radius:1.35rem;border:2px solid rgba(122,158,90,.4);
  pointer-events:none;display:none;animation:pulse-ring 2s ease-out infinite}
.timer-card.running .pulse-ring{display:block}
.timer-card.running.urgent-card .pulse-ring{border-color:rgba(212,131,10,.4);animation-duration:1.3s}
.timer-card.running.critical-card .pulse-ring{border-color:rgba(192,57,43,.45);animation-duration:.8s}

.running-badge{display:none;position:absolute;top:.65rem;left:50%;transform:translateX(-50%);
  background:linear-gradient(90deg,var(--sage-d),var(--sage));color:#fff;font-size:.6rem;font-weight:900;
  letter-spacing:.1em;text-transform:uppercase;padding:2px 10px;border-radius:2rem;z-index:10;
  box-shadow:0 2px 6px rgba(78,112,53,.3)}
.timer-card.running .running-badge{display:block}
.timer-card.running.urgent-card .running-badge{background:linear-gradient(90deg,#b87400,var(--amber))}
.timer-card.running.critical-card .running-badge{background:linear-gradient(90deg,#8b1a10,var(--red))}

.progress-ring-wrap{position:absolute;top:.8rem;right:.8rem;width:32px;height:32px;opacity:0;transition:opacity .35s}
.timer-card.running .progress-ring-wrap{opacity:1}
.progress-ring-bg{fill:none;stroke:var(--sage-p);stroke-width:3}
.progress-ring-fg{fill:none;stroke:var(--sage);stroke-width:3;stroke-linecap:round}

.task-name{font-size:.88rem;font-weight:700;border:none;background:transparent;outline:none;
  color:var(--ink-s);width:78%;border-bottom:2px sol
