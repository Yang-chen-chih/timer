<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計時器</title>
    <link rel="icon" href="下載4.jpg" type="image/jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=Varela+Round&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --sage: #7a9e5a; --sage-light: #b5d18c; --sage-pale: #e8f3db; --sage-deep: #4e7035;
            --ink: #1c2712; --ink-mid: #3d4f2a; --ink-soft: #6b7f57; --ink-faint: #9ab07f;
            --parchment: #f2f7ea; --cream: #fdfef9;
            --amber: #d4830a; --amber-pale: #fff7e6;
            --red: #c0392b; --red-pale: #fff0ee;
            --card-border: rgba(122,158,90,0.2);
            --shadow-card: 0 1px 12px rgba(28,39,18,0.07);
            --shadow-hover: 0 6px 32px rgba(28,39,18,0.12);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--parchment);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 6rem;
        }

        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse 80% 55% at 10% 15%, rgba(181,209,140,0.22) 0%, transparent 60%),
                radial-gradient(ellipse 50% 70% at 88% 80%, rgba(122,158,90,0.13) 0%, transparent 55%);
        }

        /* ── Header ── */
        header {
            position: relative; z-index: 20;
            padding: 1.75rem 2.5rem 0;
            display: flex; align-items: flex-end; justify-content: space-between;
        }
        .brand-title {
            font-family: 'Nunito', sans-serif;
            font-size: 2.4rem; font-weight: 900; color: var(--ink); letter-spacing: -0.03em;
        }
        .brand-title span { color: var(--sage); }
        .sync-area { display: flex; align-items: center; gap: 6px; padding-bottom: 4px; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; transition: all 0.4s; }
        .sync-dot.synced { background: #6ab84a; box-shadow: 0 0 0 3px rgba(106,184,74,0.2); }
        .sync-label { font-size: 0.7rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; }

        /* ── Upcoming bar ── */
        .upcoming-bar {
            position: relative; z-index: 20;
            margin: 1.25rem 2.5rem 0;
            background: var(--cream);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            padding: 0.75rem 1.25rem;
            display: flex; align-items: center; gap: 0.5rem;
            box-shadow: var(--shadow-card);
            min-height: 52px;
            overflow: hidden;
        }
        .upcoming-bar::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
            background: linear-gradient(180deg, var(--sage-light), var(--sage));
            border-radius: 4px 0 0 4px;
        }
        .upcoming-label {
            font-size: 0.7rem; font-weight: 700; color: var(--ink-soft);
            text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; padding-left: 0.25rem;
        }
        .upcoming-chips { display: flex; gap: 0.5rem; flex-wrap: wrap; flex: 1; }
        .upcoming-chip {
            display: flex; align-items: center; gap: 6px;
            background: var(--sage-pale);
            border: 1px solid rgba(122,158,90,0.25);
            border-radius: 2rem; padding: 4px 10px 4px 8px;
            font-size: 0.75rem; color: var(--ink-mid); font-weight: 700;
            transition: all 0.3s;
        }
        .upcoming-chip.urgent  { background: var(--amber-pale); border-color: rgba(212,131,10,0.3);  color: #7a4800; animation: blink 1.2s ease-in-out infinite; }
        .upcoming-chip.critical{ background: var(--red-pale);   border-color: rgba(192,57,43,0.3);   color: #7a1a10; animation: blink 0.7s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.65} }
        .chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sage); flex-shrink: 0; }
        .chip-dot.urgent   { background: var(--amber); }
        .chip-dot.critical { background: var(--red); }
        .chip-name { max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chip-time { font-family: 'Varela Round', sans-serif; font-size: 0.8rem; }
        .upcoming-empty { font-size: 0.8rem; color: var(--ink-faint); padding-left: 0.25rem; font-style: italic; }

        /* ── Stats ── */
        .stats-strip {
            position: relative; z-index: 15;
            margin: 0.9rem 2.5rem 0;
            display: flex; gap: 0.75rem;
        }
        .stat-pill {
            background: var(--cream); border: 1px solid var(--card-border);
            border-radius: 2rem; padding: 0.35rem 0.85rem;
            display: flex; align-items: center; gap: 6px;
            font-size: 0.72rem; color: var(--ink-soft); font-weight: 700;
        }
        .stat-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sage-light); }
        .stat-dot.active { background: var(--sage); box-shadow: 0 0 0 2px rgba(122,158,90,0.2); }
        .stat-num { font-family: 'Varela Round', sans-serif; font-size: 0.85rem; color: var(--ink-mid); }

        /* ── Grid ── */
        .grid-wrap {
            position: relative; z-index: 10;
            padding: 1.5rem 2.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 1.2rem; align-items: start;
        }

        /* ── Cards ── */
        .timer-card {
            background: var(--cream);
            border: 1.5px solid rgba(122,158,90,0.12);
            border-radius: 1.1rem; padding: 1.2rem 1.1rem 1rem;
            box-shadow: 0 1px 4px rgba(28,39,18,0.04);
            transition: all 0.35s ease;
            display: flex; flex-direction: column; gap: 0.3rem;
            cursor: pointer; position: relative; overflow: hidden;
            opacity: 0.7; filter: saturate(0.5);
        }
        .timer-card:hover {
            opacity: 0.9; filter: saturate(0.8);
            box-shadow: var(--shadow-hover); transform: translateY(-1px);
            border-color: rgba(122,158,90,0.3);
        }
        .timer-card.running {
            background: #fff; border: 2px solid rgba(122,158,90,0.55);
            border-radius: 1.25rem; padding: 1.4rem 1.3rem 1.2rem;
            opacity: 1; filter: none;
            transform: translateY(-4px) scale(1.02);
            box-shadow:
                0 8px 36px rgba(28,39,18,0.13),
                0 0 0 4px rgba(122,158,90,0.1),
                inset 0 0 0 1px rgba(181,209,140,0.4);
            z-index: 5;
        }
        .timer-card.running:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 12px 44px rgba(28,39,18,0.16), 0 0 0 5px rgba(122,158,90,0.12);
        }
        .timer-card.done {
            border: 2px solid rgba(212,131,10,0.55);
            background: var(--amber-pale); opacity: 1; filter: none;
            transform: translateY(-2px);
            animation: shake 0.45s infinite alternate;
            box-shadow: 0 4px 20px rgba(212,131,10,0.2), 0 0 0 4px rgba(212,131,10,0.08);
        }
        @keyframes shake {
            from { transform: rotate(-0.8deg) scale(1.01); }
            to   { transform: rotate( 0.8deg) scale(1.01); }
        }
        .timer-card.running.urgent-card   { border-color: rgba(212,131,10,0.55); box-shadow: 0 8px 36px rgba(212,131,10,0.15), 0 0 0 4px rgba(212,131,10,0.1); }
        .timer-card.running.critical-card { border-color: rgba(192,57,43,0.55);  box-shadow: 0 8px 36px rgba(192,57,43,0.15),  0 0 0 4px rgba(192,57,43,0.1); }

        /* Accent bar */
        .timer-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
            border-radius: 3px 0 0 3px; transition: background 0.3s;
        }
        .timer-card.running::before                   { background: linear-gradient(180deg, var(--sage-light), var(--sage)); }
        .timer-card.done::before                      { background: linear-gradient(180deg, #f5c842, var(--amber)); }
        .timer-card.running.urgent-card::before       { background: linear-gradient(180deg, #f5c842, var(--amber)); }
        .timer-card.running.critical-card::before     { background: linear-gradient(180deg, #f5a0a0, var(--red)); }

        /* Pulse ring */
        @keyframes pulse-ring {
            0%   { transform: scale(1);    opacity: 0.45; }
            70%  { transform: scale(1.12); opacity: 0; }
            100% { transform: scale(1);    opacity: 0; }
        }
        .pulse-ring {
            position: absolute; inset: -6px; border-radius: 1.35rem;
            border: 2px solid rgba(122,158,90,0.4);
            pointer-events: none; display: none;
            animation: pulse-ring 2s ease-out infinite;
        }
        .timer-card.running .pulse-ring                   { display: block; }
        .timer-card.running.urgent-card .pulse-ring       { border-color: rgba(212,131,10,0.4); animation-duration: 1.3s; }
        .timer-card.running.critical-card .pulse-ring     { border-color: rgba(192,57,43,0.45); animation-duration: 0.8s; }

        /* Running badge */
        .running-badge {
            display: none; position: absolute; top: 0.65rem; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, var(--sage-deep), var(--sage));
            color: #fff; font-size: 0.6rem; font-weight: 900;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 2px 10px; border-radius: 2rem; z-index: 10;
            box-shadow: 0 2px 6px rgba(78,112,53,0.3); white-space: nowrap;
        }
        .timer-card.running .running-badge                { display: block; }
        .timer-card.running.urgent-card .running-badge    { background: linear-gradient(90deg, #b87400, var(--amber)); }
        .timer-card.running.critical-card .running-badge  { background: linear-gradient(90deg, #8b1a10, var(--red)); }

        /* Progress ring */
        .progress-ring-wrap {
            position: absolute; top: 0.8rem; right: 0.8rem;
            width: 32px; height: 32px; opacity: 0; transition: opacity 0.35s;
        }
        .timer-card.running .progress-ring-wrap { opacity: 1; }
        .ring-bg { fill: none; stroke: var(--sage-pale); stroke-width: 3; }
        .ring-fg { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.9s linear; }

        /* Task name */
        .task-name {
            font-size: 0.88rem; font-weight: 700;
            border: none; background: transparent; outline: none;
            color: var(--ink-soft); width: 78%;
            border-bottom: 2px solid transparent; padding-bottom: 1px;
            transition: border-color 0.2s, color 0.3s; margin-top: 1.4rem;
        }
        .timer-card.running .task-name { color: var(--ink-mid); font-size: 0.95rem; }
        .timer-card.done    .task-name { color: #7a4800; }
        .task-name:focus { border-bottom-color: var(--sage); }

        /* Time display */
        .time-display { display: flex; justify-content: center; align-items: center; margin: 0.1rem 0; }
        .time-input {
            font-family: 'Varela Round', sans-serif;
            font-size: 3.0rem; font-weight: 900;
            width: 1.65em; padding: 0; text-align: center;
            border: none; background: transparent; outline: none;
            color: rgba(28,39,18,0.35); border-radius: 0.4rem;
            -moz-appearance: textfield; transition: background 0.15s, color 0.3s, font-size 0.3s;
        }
        .time-input::-webkit-outer-spin-button,
        .time-input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .time-input:focus { background: var(--sage-pale); }
        .timer-card.running          .time-input { font-size: 3.8rem; color: var(--ink); }
        .timer-card.done             .time-input { color: var(--amber); }
        .timer-card.running.urgent-card   .time-input { color: var(--amber); }
        .timer-card.running.critical-card .time-input { color: var(--red); }

        .time-sep {
            font-size: 2.6rem; font-weight: 900; line-height: 1; margin-bottom: 0.35rem;
            color: rgba(122,158,90,0.25); transition: color 0.3s, font-size 0.3s;
        }
        .timer-card.running          .time-sep { font-size: 3.2rem; color: rgba(122,158,90,0.6); }
        .timer-card.done             .time-sep { color: rgba(212,131,10,0.5); }
        .timer-card.running.urgent-card   .time-sep { color: rgba(212,131,10,0.5); }
        .timer-card.running.critical-card .time-sep { color: rgba(192,57,43,0.5); }

        /* Status badge */
        .status-badge {
            font-size: 0.65rem; text-align: center; font-weight: 700;
            color: rgba(155,176,127,0.7); padding: 0.25rem 0.5rem;
            background: transparent; border-radius: 2rem;
            margin-top: 0.1rem; text-transform: uppercase; letter-spacing: 0.07em; transition: all 0.3s;
        }
        .timer-card.running          .status-badge { background: rgba(122,158,90,0.1);  color: var(--sage-deep); }
        .timer-card.done             .status-badge { background: rgba(212,131,10,0.12); color: var(--amber); }
        .timer-card.running.urgent-card   .status-badge { background: rgba(212,131,10,0.1); color: #b87400; }
        .timer-card.running.critical-card .status-badge { background: rgba(192,57,43,0.1);  color: var(--red); }

        /* Delete button */
        .delete-btn {
            position: absolute; top: 0.65rem; right: 0.65rem;
            background: rgba(0,0,0,0.04); border: none; cursor: pointer;
            width: 22px; height: 22px; border-radius: 50%;
            color: #bbb; z-index: 20;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; transition: all 0.2s;
        }
        .delete-btn:hover { background: #ff5f5f; color: #fff; }
        .timer-card.running .delete-btn { display: none; }

        /* Add card */
        .add-card {
            border: 2px dashed rgba(122,158,90,0.3); border-radius: 1.1rem;
            min-height: 150px; display: grid; place-items: center;
            cursor: pointer; color: rgba(122,158,90,0.5); font-weight: 800;
            font-size: 0.9rem; transition: all 0.2s; letter-spacing: 0.02em; opacity: 0.7;
        }
        .add-card:hover { background: var(--sage-pale); transform: scale(1.02); border-color: var(--sage); opacity: 1; color: var(--sage); }
        .add-card-inner { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
        .add-icon { font-size: 1.6rem; opacity: 0.5; }

        /* Section labels */
        .section-label {
            grid-column: 1 / -1;
            font-size: 0.68rem; font-weight: 700; color: var(--ink-soft);
            text-transform: uppercase; letter-spacing: 0.1em;
            display: flex; align-items: center; gap: 0.6rem; margin-top: 0.4rem;
        }
        .section-label::after { content: ''; flex: 1; height: 1px; background: rgba(122,158,90,0.15); }
        .section-label.idle-label { color: var(--ink-faint); margin-top: 0.8rem; }

        /* Loading */
        .loading-overlay {
            position: fixed; inset: 0; background: var(--parchment);
            z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.5s; gap: 1rem;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loader-spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--sage-pale); border-top-color: var(--sage);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { color: var(--ink-soft); font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div class="loader-spinner"></div>
    <span class="loader-text">載入中…</span>
</div>

<header>
    <h1 class="brand-title">計時<span>器</span></h1>
    <div class="sync-area">
        <div class="sync-dot" id="sync-dot"></div>
        <span class="sync-label" id="sync-label">連接中</span>
    </div>
</header>

<div class="upcoming-bar">
    <span class="upcoming-label">即將完成</span>
    <div class="upcoming-chips" id="upcoming-chips">
        <span class="upcoming-empty">目前沒有進行中的計時</span>
    </div>
</div>

<div class="stats-strip">
    <div class="stat-pill">
        <div class="stat-dot active"></div>
        <span>進行中</span>
        <span class="stat-num" id="stat-active">0</span>
    </div>
    <div class="stat-pill">
        <div class="stat-dot"></div>
        <span>全部</span>
        <span class="stat-num" id="stat-total">0</span>
    </div>
</div>

<div class="grid-wrap" id="timer-grid"></div>

<script>
const CONFIG = {
    URL:   'https://zhcahednvdamivzlwziz.supabase.co',
    KEY:   'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoY2FoZWRudmRhbWl2emx3eml6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTM4MTIsImV4cCI6MjA4OTg4OTgxMn0.W1R1dddjcP28QKqECH4bELwMq3eSWCB0lJUMLtzQp04',
    TABLE: 'timers'
};

const db = supabase.createClient(CONFIG.URL, CONFIG.KEY);
let timers = [];
let editingId = null;  // id of timer whose input is focused

/* ── Helpers ── */
const urgency = t => t.is_active
    ? (t.remaining_seconds <= 20 ? 'critical' : t.remaining_seconds <= 60 ? 'urgent' : '')
    : '';

const fmtTime = s => {
    const m = Math.floor(s / 60), sec = s % 60;
    return m > 0 ? `${m}分${sec > 0 ? sec + '秒' : ''}` : `${sec}秒`;
};

/* ── Audio ── */
const playBeep = () => {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [880, 1100, 880].forEach((freq, i) => {
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = freq;
            const t = ctx.currentTime + i * 0.18;
            gain.gain.setValueAtTime(0.4, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
            osc.start(t); osc.stop(t + 0.18);
        });
    } catch(e) {}
};

/* ── UI updates ── */
function updateUpcomingBar() {
    const el = document.getElementById('upcoming-chips');
    const active = timers.filter(t => t.is_active && t.remaining_seconds > 0)
        .sort((a, b) => a.remaining_seconds - b.remaining_seconds);
    if (!active.length) {
        el.innerHTML = '<span class="upcoming-empty">目前沒有進行中的計時</span>';
        return;
    }
    el.innerHTML = active.map(t => {
        const u = urgency(t);
        return `<div class="upcoming-chip ${u}">
            <div class="chip-dot ${u}"></div>
            <span class="chip-name">${(t.name || '任務').substring(0, 10)}</span>
            <span class="chip-time">${fmtTime(t.remaining_seconds)}</span>
        </div>`;
    }).join('');
}

function updateTabTitle() {
    const active = timers.filter(t => t.is_active && t.remaining_seconds > 0)
        .sort((a, b) => a.remaining_seconds - b.remaining_seconds);
    if (!active.length) { document.title = '計時器'; return; }
    const t = active[0];
    const m = Math.floor(t.remaining_seconds / 60);
    const s = String(t.remaining_seconds % 60).padStart(2, '0');
    const icon = t.remaining_seconds <= 20 ? '🔴' : t.remaining_seconds <= 60 ? '🟡' : '🟢';
    document.title = `${icon} ${m}:${s} ${(t.name || '任務').substring(0, 8)}`;
}

/* ── Full render ── */
function renderAll() {
    if (editingId) return;
    const grid = document.getElementById('timer-grid');
    grid.innerHTML = '';

    const running = timers.filter(t => t.is_active).sort((a, b) => a.remaining_seconds - b.remaining_seconds);
    const idle    = timers.filter(t => !t.is_active);

    const addLabel = (text, cls = '') => {
        const d = document.createElement('div');
        d.className = `section-label ${cls}`;
        d.textContent = text;
        grid.appendChild(d);
    };

    if (running.length) { addLabel(`▶ 計時中（${running.length}）`); running.forEach(t => grid.appendChild(buildCard(t))); }
    if (idle.length)    { addLabel(`待機（${idle.length}）`, 'idle-label'); idle.forEach(t => grid.appendChild(buildCard(t))); }

    const addBtn = document.createElement('div');
    addBtn.className = 'add-card';
    addBtn.innerHTML = '<div class="add-card-inner"><div class="add-icon">＋</div><span>新增任務</span></div>';
    addBtn.onclick = () => db.from(CONFIG.TABLE).insert([{ name: '新任務', initial_seconds: 0, remaining_seconds: 0, is_active: false }]);
    grid.appendChild(addBtn);

    document.getElementById('stat-active').textContent = running.length;
    document.getElementById('stat-total').textContent  = timers.length;
    updateUpcomingBar();
    updateTabTitle();
}

/* ── Build a single card ── */
function buildCard(t) {
    const isDone     = !t.is_active && t.initial_seconds > 0 && t.remaining_seconds <= 0;
    const u          = urgency(t);
    const RING_R     = 12, CIRC = 2 * Math.PI * RING_R;
    const progress   = t.initial_seconds > 0 ? Math.max(0, Math.min(1, t.remaining_seconds / t.initial_seconds)) : 0;
    const offset     = (CIRC * (1 - progress)).toFixed(2);
    const ringColor  = u === 'critical' ? '#c0392b' : u === 'urgent' ? '#d4830a' : '#7a9e5a';

    const classes    = ['timer-card', t.is_active && 'running', isDone && 'done', u && `${u}-card`].filter(Boolean).join(' ');
    const badgeText  = u === 'critical' ? '🔴 即將完成' : u === 'urgent' ? '🟡 快要結束' : '▶ 計時中';
    const statusText = isDone ? '已結束' : t.is_active ? (u === 'critical' ? '即將完成' : u === 'urgent' ? '快要結束' : '正在計時') : '點擊開始';
    const mins       = String(Math.floor(t.remaining_seconds / 60)).padStart(2, '0');
    const secs       = String(t.remaining_seconds % 60).padStart(2, '0');

    const card = document.createElement('div');
    card.className  = classes;
    card.dataset.id = t.id;
    card.innerHTML  = `
        <div class="pulse-ring"></div>
        ${t.is_active ? `<div class="running-badge">${badgeText}</div>` : ''}
        <button class="delete-btn" onclick="event.stopPropagation();deleteTimer('${t.id}')">✕</button>
        <svg class="progress-ring-wrap" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" style="transform:rotate(-90deg)">
            <circle class="ring-bg" cx="16" cy="16" r="${RING_R}"/>
            <circle class="ring-fg" cx="16" cy="16" r="${RING_R}"
                stroke="${ringColor}"
                stroke-dasharray="${CIRC.toFixed(2)}"
                stroke-dashoffset="${offset}"/>
        </svg>
        <input class="task-name" value="${t.name || ''}"
            onfocus="editingId='${t.id}'"
            onblur="onNameBlur(this,'${t.id}')">
        <div class="time-display">
            <input type="number" class="time-input" data-role="min" value="${mins}"
                onfocus="editingId='${t.id}'; this.select()"
                onblur="onTimeBlur(this,'${t.id}')">
            <span class="time-sep">:</span>
            <input type="number" class="time-input" data-role="sec" value="${secs}"
                onfocus="editingId='${t.id}'; this.select()"
                onblur="onTimeBlur(this,'${t.id}')">
        </div>
        <div class="status-badge">${statusText}</div>`;

    card.onclick = e => { if (e.target.tagName !== 'INPUT') toggleTimer(t.id); };
    card.querySelectorAll('input').forEach(inp => { inp.onkeydown = e => { if (e.key === 'Enter') inp.blur(); }; });
    return card;
}

/* ── Lightweight in-place update (no full re-render) ── */
function updateCardDisplay(t) {
    if (editingId === t.id) return;
    const card = document.querySelector(`.timer-card[data-id="${t.id}"]`);
    if (!card) return;

    const mEl = card.querySelector('[data-role="min"]');
    const sEl = card.querySelector('[data-role="sec"]');
    if (mEl) mEl.value = String(Math.floor(t.remaining_seconds / 60)).padStart(2, '0');
    if (sEl) sEl.value = String(t.remaining_seconds % 60).padStart(2, '0');

    const RING_R = 12, CIRC = 2 * Math.PI * RING_R;
    const progress = t.initial_seconds > 0 ? Math.max(0, t.remaining_seconds / t.initial_seconds) : 0;
    const ring = card.querySelector('.ring-fg');
    if (ring) {
        ring.setAttribute('stroke-dashoffset', (CIRC * (1 - progress)).toFixed(2));
        const u = urgency(t);
        ring.setAttribute('stroke', u === 'critical' ? '#c0392b' : u === 'urgent' ? '#d4830a' : '#7a9e5a');
    }

    const badge = card.querySelector('.status-badge');
    if (badge) {
        const u = urgency(t);
        badge.textContent = u === 'critical' ? '即將完成' : u === 'urgent' ? '快要結束' : '正在計時';
    }
}

/* ── Input handlers ── */
async function onNameBlur(el, id) {
    const t = timers.find(x => x.id === id);
    if (t) t.name = el.value;
    editingId = null;
    await db.from(CONFIG.TABLE).update({ name: el.value }).eq('id', id);
    renderAll();
}

async function onTimeBlur(el, id) {
    const card = document.querySelector(`.timer-card[data-id="${id}"]`);
    if (!card) return;
    const m = parseInt(card.querySelector('[data-role="min"]').value) || 0;
    const s = parseInt(card.querySelector('[data-role="sec"]').value) || 0;
    const total = Math.min(99, m) * 60 + Math.min(59, s);
    const t = timers.find(x => x.id === id);
    if (!t) return;
    t.remaining_seconds = total;
    t.initial_seconds   = total;
    t.is_active         = false;
    t.endTime           = null;
    editingId = null;
    if (total > 0) {
        await toggleTimer(id);
    } else {
        renderAll();
        await db.from(CONFIG.TABLE).update({ remaining_seconds: 0, initial_seconds: 0, is_active: false }).eq('id', id);
    }
}

/* ── Toggle ── */
async function toggleTimer(id) {
    const t = timers.find(x => x.id === id);
    if (!t) return;
    // Tap done-card → reset
    if (!t.is_active && t.initial_seconds > 0 && t.remaining_seconds <= 0) {
        t.remaining_seconds = 0; t.initial_seconds = 0;
        renderAll();
        await db.from(CONFIG.TABLE).update({ remaining_seconds: 0, initial_seconds: 0, is_active: false }).eq('id', id);
        return;
    }
    if (t.remaining_seconds <= 0) return;
    t.is_active = !t.is_active;
    // Key fix: store absolute end timestamp
    t.endTime = t.is_active ? Date.now() + t.remaining_seconds * 1000 : null;
    renderAll();
    await db.from(CONFIG.TABLE).update({ is_active: t.is_active, remaining_seconds: t.remaining_seconds, initial_seconds: t.initial_seconds }).eq('id', id);
}

async function deleteTimer(id) {
    await db.from(CONFIG.TABLE).delete().eq('id', id);
}

/* ── Realtime ── */
db.channel('timer-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: CONFIG.TABLE }, p => {
        if (editingId) return;
        if (p.eventType === 'INSERT') {
            timers.push({ ...p.new, endTime: null });
        } else if (p.eventType === 'DELETE') {
            timers = timers.filter(x => x.id !== p.old.id);
        } else if (p.eventType === 'UPDATE') {
            const t = timers.find(x => x.id === p.new.id);
            if (t) {
                const wasActive = t.is_active;
                Object.assign(t, p.new);
                // Recalculate endTime only when active state changes
                if (!wasActive && t.is_active) t.endTime = Date.now() + t.remaining_seconds * 1000;
                else if (!t.is_active)          t.endTime = null;
            }
        }
        renderAll();
    })
    .subscribe();

/* ── Tick loop ── */
// Uses absolute endTime to avoid drift. Runs at 100 ms for sub-second accuracy.
setInterval(() => {
    const now = Date.now();
    let needFullRender = false;
    let needBarUpdate  = false;

    timers.forEach(t => {
        if (!t.is_active || !t.endTime) return;
        const newSec = Math.max(0, Math.ceil((t.endTime - now) / 1000));

        if (newSec === t.remaining_seconds) return; // nothing changed

        const prevSec = t.remaining_seconds;
        t.remaining_seconds = newSec;

        if (newSec <= 0) {
            t.is_active = false; t.endTime = null;
            playBeep(); needFullRender = true;
            db.from(CONFIG.TABLE).update({ remaining_seconds: 0, is_active: false }).eq('id', t.id);
        } else {
            // Trigger full re-render on urgency threshold crossings
            if ((prevSec === 61 && newSec === 60) || (prevSec === 21 && newSec === 20)) {
                needFullRender = true;
            } else {
                updateCardDisplay(t);
                needBarUpdate = true;
            }
        }
    });

    if (needFullRender) renderAll();
    else if (needBarUpdate) { updateUpcomingBar(); updateTabTitle(); }
}, 100);

/* ── Init ── */
async function fetchTimers() {
    const { data } = await db.from(CONFIG.TABLE).select('*').order('created_at', { ascending: true });
    timers = (data || []).map(t => ({
        ...t,
        endTime: t.is_active ? Date.now() + t.remaining_seconds * 1000 : null
    }));
    renderAll();
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('sync-dot').className = 'sync-dot synced';
    document.getElementById('sync-label').textContent = '已同步';
}

fetchTimers();
</script>
</body>
</html>
