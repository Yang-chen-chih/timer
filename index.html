<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計時器 Vitality Timer</title>
    <link rel="icon" href="下載.jpg" type="image/jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f7fcf2;
            color: #2d3a1f;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .glass-card {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        @keyframes pulse-orange {
            0%, 100% { border-color: #ff9f43; background-color: #fff9f2; box-shadow: 0 10px 15px -3px rgba(255, 159, 67, 0.2); }
            50% { border-color: #ffc285; background-color: #fffdfa; box-shadow: 0 20px 25px -5px rgba(255, 159, 67, 0.1); }
        }

        .animate-done {
            animation: pulse-orange 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- 頂部生機 Banner -->
    <div class="relative h-48 md:h-64 overflow-hidden border-b border-lime-100">
        <div id="loading-placeholder" class="absolute inset-0 flex items-center justify-center bg-lime-50 animate-pulse">
            <i data-lucide="leaf" class="w-10 h-10 text-lime-200 animate-spin"></i>
        </div>
        <img id="header-img" src="" alt="Nature Banner" class="w-full h-full object-cover opacity-80 hidden">
        
        <div class="absolute inset-0 bg-gradient-to-t from-[#f7fcf2] to-transparent"></div>
        
        <div class="absolute bottom-6 left-6 md:left-12 flex items-center gap-4">
            <div class="bg-[#89b449] p-2.5 rounded-2xl shadow-xl shadow-lime-200/50">
                <i data-lucide="hourglass" class="w-8 h-8 text-white"></i>
            </div>
            <div>
                <h1 class="text-3xl font-black tracking-tight">生機計時</h1>
                <p class="text-xs text-[#89b449] font-bold tracking-[0.2em] uppercase italic">Efficiency & Vitality</p>
            </div>
        </div>
    </div>

    <!-- 主要內容區 -->
    <div class="max-w-6xl mx-auto p-6 md:p-12 -mt-6 relative z-10">
        <div id="timer-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 計時器卡片將在此生成 -->
        </div>
    </div>

    <script>
        const apiKey = ""; // 預留環境自動填充
        let timers = [
            { id: Date.now(), name: '輸入名稱', initialSeconds: 0, remainingSeconds: 0, isActive: false }
        ];

        // 初始化圖標
        function initIcons() {
            lucide.createIcons();
        }

        // 生成 AI 背景圖 (Imagen 4.0)
        async function generateBackground() {
            const headerImg = document.getElementById('header-img');
            const placeholder = document.getElementById('loading-placeholder');
            
            try {
                const prompt = "A high-quality, minimalist, wide-angle banner of a fresh green forest with morning sunlight filtering through leaves, soft bokeh, serene and vital nature atmosphere, pastel green and white tones.";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: prompt }],
                        parameters: { sampleCount: 1 }
                    })
                });
                
                const result = await response.json();
                if (result.predictions && result.predictions[0]) {
                    headerImg.src = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    headerImg.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                }
            } catch (error) {
                console.error("背景生成失敗", error);
                placeholder.innerHTML = '<span class="text-lime-400 font-bold">Nature Mode</span>';
            }
        }

        // 渲染計時器列表
        function renderTimers() {
            const grid = document.getElementById('timer-grid');
            grid.innerHTML = '';

            // 排序：剩餘時間少的在前
            const sorted = [...timers].sort((a, b) => a.remainingSeconds - b.remainingSeconds);

            sorted.forEach(timer => {
                const mins = Math.floor(timer.remainingSeconds / 60);
                const secs = timer.remainingSeconds % 60;
                const isDone = timer.remainingSeconds === 0 && timer.initialSeconds > 0;
                const isRunning = timer.isActive && timer.remainingSeconds > 0;

                const card = document.createElement('div');
                card.className = `group glass-card rounded-[2.5rem] border-2 transition-all duration-500 flex flex-col h-[150px] px-8 py-5 relative overflow-hidden ${
                    isDone ? 'animate-done' : isRunning ? 'border-[#89b449]/40 bg-white/90 shadow-lg' : 'border-white bg-white/70 shadow-sm hover:shadow-xl hover:border-[#89b449]/50'
                }`;

                card.innerHTML = `
                    <div class="absolute -right-4 -top-4 w-16 h-16 rounded-full transition-colors duration-500 ${isRunning ? 'bg-lime-50/50' : 'bg-stone-50/50'}"></div>
                    
                    <div class="flex justify-between items-center relative z-10">
                        <div class="flex items-center gap-2">
                            ${isRunning ? '<i data-lucide="zap" class="w-3 h-3 text-yellow-500 animate-bounce"></i>' : ''}
                            <input type="text" value="${timer.name}" 
                                class="font-black text-sm text-[#4a5d33] bg-transparent outline-none border-b-2 border-transparent focus:border-[#89b449]"
                                onchange="updateName(${timer.id}, this.value)">
                        </div>
                        <button onclick="deleteTimer(${timer.id})" class="text-stone-300 hover:text-[#ff6b6b] p-1">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>

                    <div class="flex-1 flex items-center justify-center gap-1 relative z-10 scale-110">
                        <input type="number" value="${mins}" 
                            class="w-16 text-5xl font-mono font-black text-center bg-transparent outline-none transition-colors ${isRunning ? 'text-[#89b449]' : isDone ? 'text-[#ff9f43]' : 'text-[#2d3a1f]'}"
                            onfocus="this.select()" onchange="handleInputChange(${timer.id}, 'mins', this.value)">
                        <span class="text-3xl font-bold ${isRunning ? 'text-[#89b449]/40' : 'text-stone-200'}">:</span>
                        <input type="number" value="${secs}" 
                            class="w-16 text-5xl font-mono font-black text-center bg-transparent outline-none transition-colors ${isRunning ? 'text-[#89b449]' : isDone ? 'text-[#ff9f43]' : 'text-[#2d3a1f]'}"
                            onfocus="this.select()" onchange="handleInputChange(${timer.id}, 'secs', this.value)">
                    </div>

                    <div class="text-center relative z-10">
                        <p class="text-[9px] font-black uppercase tracking-[0.2em] ${isRunning ? 'text-[#89b449]' : isDone ? 'text-[#ff9f43]' : 'text-stone-400'}">
                            ${isRunning ? "Focusing" : isDone ? "Finish!" : "Set Time"}
                        </p>
                    </div>
                `;
                grid.appendChild(card);
            });

            // 新增按鈕卡片
            const addCard = document.createElement('button');
            addCard.className = "group flex items-center justify-center gap-4 bg-white/40 backdrop-blur-sm rounded-[2.5rem] border-2 border-dashed border-[#c5e1a5] h-[150px] transition-all hover:border-[#89b449] hover:bg-white/60 active:scale-95 shadow-sm";
            addCard.onclick = addNewTimer;
            addCard.innerHTML = `
                <div class="bg-white p-3 rounded-2xl shadow-sm group-hover:bg-[#89b449] transition-all relative">
                    <i data-lucide="hourglass" class="w-6 h-6 text-[#89b449] group-hover:text-white"></i>
                    <div class="absolute -right-1 -bottom-1 bg-white rounded-full p-0.5 group-hover:bg-[#89b449] transition-colors">
                        <i data-lucide="plus" class="w-2.5 h-2.5 text-[#89b449] group-hover:text-white stroke-[4px]"></i>
                    </div>
                </div>
                <div class="text-left">
                    <span class="block text-lg font-black text-[#89b449]">新增任務</span>
                    <span class="block text-[9px] font-bold text-[#89b449]/60 uppercase tracking-widest italic">New Vitality</span>
                </div>
            `;
            grid.appendChild(addCard);
            initIcons();
        }

        // 功能函式
        function addNewTimer() {
            timers.push({ id: Date.now(), name: `新計畫 ${timers.length + 1}`, initialSeconds: 0, remainingSeconds: 0, isActive: false });
            renderTimers();
        }

        function deleteTimer(id) {
            timers = timers.filter(t => t.id !== id);
            renderTimers();
        }

        function updateName(id, name) {
            timers = timers.map(t => t.id === id ? { ...t, name } : t);
        }

        function handleInputChange(id, field, value) {
            timers = timers.map(timer => {
                if (timer.id === id) {
                    const mins = Math.floor(timer.remainingSeconds / 60);
                    const secs = timer.remainingSeconds % 60;
                    let numValue = Math.max(0, parseInt(value) || 0);
                    let newTotal;
                    
                    if (field === 'mins') {
                        newTotal = numValue * 60 + secs;
                    } else {
                        newTotal = mins * 60 + Math.min(59, numValue);
                    }
                    
                    return { ...timer, initialSeconds: newTotal, remainingSeconds: newTotal, isActive: newTotal > 0 };
                }
                return timer;
            });
            renderTimers();
        }

        // 計時核心循環
        setInterval(() => {
            let changed = false;
            timers = timers.map(timer => {
                if (timer.isActive && timer.remainingSeconds > 0) {
                    changed = true;
                    return { ...timer, remainingSeconds: timer.remainingSeconds - 1 };
                } else if (timer.isActive && timer.remainingSeconds <= 0) {
                    changed = true;
                    return { ...timer, remainingSeconds: 0, isActive: false };
                }
                return timer;
            });
            if (changed) renderTimers();
        }, 1000);

        // 初始執行
        window.onload = () => {
            generateBackground();
            renderTimers();
        };
    </script>
</body>
</html>
